version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: micatalogo-app
    container_name: micatalogo-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - micatalogo-net
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: micatalogo-web
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - micatalogo-net
    depends_on:
      - app

  db:
    image: mariadb:10.6
    container_name: micatalogo-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: api_micatalogo
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - micatalogo-db-data:/var/lib/mysql
    networks:
      - micatalogo-net

networks:
  micatalogo-net:
    driver: bridge

volumes:
  micatalogo-db-data:
